name: Bug report
description: Report an install, validation, or pet bundle issue.
title: "Bug: "
labels: [bug]
body:
  - type: input
    id: pet
    attributes:
      label: Pet id
      placeholder: signal-heron
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened? Include the command and error output if relevant.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Codex version if relevant.
